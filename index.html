<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Study 2 Survey Router</title>
</head>
<body style="font-family: Arial; padding: 24px;">
  
  <h2>問卷分配</h2>
  
  <img src="https://i.postimg.cc/SNJ2F5k2/IMG-5878.jpg" alt="CCLee 棒球照片" style="max-width: 100%; height: auto; margin-top: 10px; border-radius: 8px;">
  
  <p>謝謝各位!隨機分配問卷中，請稍候…</p>
  <p id="debug" style="margin-top: 12px;"></p>

  <script>
    // 1) 把八份問卷網址放進陣列
    const surveys = [
      "https://www.surveycake.com/s/aaQ64",
      "https://www.surveycake.com/s/xkdx8",
      "https://www.surveycake.com/s/dvdpz",
      "https://www.surveycake.com/s/beMa1",
      "https://www.surveycake.com/s/1qXNK",
      "https://www.surveycake.com/s/LOBbK",
      "https://www.surveycake.com/s/pbPmz",
      "https://www.surveycake.com/s/XmQlM"
    ];

    // 2) 隨機挑一份（0~7）
    const index = Math.floor(Math.random() * surveys.length);

    // 3) 選出目標網址
    const target = surveys[index];

    // 4) 3 秒後跳轉
    setTimeout(() => {
      location.href = target;
    }, 3000);
  </script>
</body>
</html>
